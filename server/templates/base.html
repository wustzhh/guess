<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}猜人物游戏{% endblock %}</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav class="navbar">
  <a href="{{ url_for('dashboard') }}" class="brand">猜人物</a>
  <div class="nav-links">
    {% if session.get('user_id') %}
      <span class="user-tag">{{ session.get('username', '?') }}</span>
      <a href="{{ url_for('dashboard') }}">首页</a>
      <a href="{{ url_for('stats') }}">战绩</a>
      <a href="{{ url_for('logout') }}">退出</a>
    {% endif %}
  </div>
</nav>

<div class="main">
  {% block content %}{% endblock %}
</div>

</body>
</html>
