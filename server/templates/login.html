{% extends "base.html" %}
{% block title %}登录 - 猜人物游戏{% endblock %}
{% block content %}
<div class="login-container">
  <h1>猜人物游戏</h1>
  <p class="subtitle">登录你的账号开始推理</p>

  <div class="card">
    {% with msgs = get_flashed_messages() %}
      {% if msgs %}
        {% for msg in msgs %}
          <div class="flash-msg">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('login') }}">
      <div class="form-group">
        <label>用户名</label>
        <input type="text" name="username" class="form-control" placeholder="输入用户名" required autofocus>
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" name="password" class="form-control" placeholder="输入密码" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block">登 录</button>
    </form>
  </div>

  <p style="text-align:center;color:var(--text-dim);font-size:0.8rem;margin-top:1rem;">
    没有账号？请联系管理员手动创建
  </p>
</div>
{% endblock %}
